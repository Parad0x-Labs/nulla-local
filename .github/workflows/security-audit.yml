name: Security Audit

on:
  schedule:
    - cron: '0 8 * * 1'   # every Monday 08:00 UTC
  workflow_dispatch:        # run manually anytime

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
        continue-on-error: true

      - name: npm audit
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=moderate --json > /tmp/npm-audit.json 2>/dev/null || true
            VULN=$(cat /tmp/npm-audit.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}))" 2>/dev/null || echo "{}")
            echo "npm: $VULN"
          else
            echo "npm: no package.json"
          fi
        continue-on-error: true

      - name: pip-audit
        run: |
          if find . -name "requirements*.txt" -not -path "*/node_modules/*" | grep -q .; then
            pip install pip-audit --quiet
            pip-audit -r $(find . -name "requirements*.txt" -not -path "*/node_modules/*" | head -1) --format=json > /tmp/pip-audit.json 2>/dev/null || true
            VULN=$(python3 -c "import json; d=json.load(open('/tmp/pip-audit.json')); print(len([v for p in d.get('dependencies',[]) for v in p.get('vulns',[])]))" 2>/dev/null || echo "0")
            echo "pip vulnerabilities: $VULN"
          else
            echo "pip: no requirements.txt"
          fi
        continue-on-error: true

      - name: cargo audit
        run: |
          if [ -f Cargo.toml ]; then
            cargo install cargo-audit --quiet 2>/dev/null || true
            cargo audit --json > /tmp/cargo-audit.json 2>/dev/null || true
            VULN=$(python3 -c "import json; d=json.load(open('/tmp/cargo-audit.json')); print(len(d.get('vulnerabilities',{}).get('list',[])))" 2>/dev/null || echo "0")
            echo "cargo vulnerabilities: $VULN"
          else
            echo "cargo: no Cargo.toml"
          fi
        continue-on-error: true

      - name: Summary
        run: |
          echo "## Security Audit — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dependabot auto-PRs handle patch fixes. This audit surfaces anything missed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check Dependabot alerts: https://github.com/Parad0x-Labs/${{ github.event.repository.name }}/security/dependabot" >> $GITHUB_STEP_SUMMARY
